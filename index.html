<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#ff6f91,#ff9671,#ffc75f);
    overflow:hidden;
    color:white;
}

.contenedor{
    max-width:800px;
    padding:30px;
    z-index:2;
}

h1{
    font-size:50px;
    margin-bottom:20px;
}

p{
    font-size:22px;
    line-height:1.8;
    margin-bottom:20px;
}

.boton{
    display:inline-block;
    margin-top:20px;
    padding:15px 35px;
    background:white;
    color:#ff4d6d;
    text-decoration:none;
    border-radius:30px;
    font-size:20px;
    font-weight:bold;
    transition:.3s;
}

.boton:hover{
    transform:scale(1.1);
}

.corazon{
    position:absolute;
    top:-50px;
    color:white;
    animation:caer linear forwards;
}

@keyframes caer{
    0%{
        transform:translateY(-100px);
        opacity:1;
    }
    100%{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="contenedor">

<h1>❤️ Para Ti ❤️</h1>

<p>
Cada kilómetro que recorro me recuerda que el mejor destino siempre será donde estés tú.
</p>

<p>
No importa la distancia, porque cada paso vale la pena cuando pienso en volver a verte.
Gracias por existir y por hacer cada día más bonito.
</p>

<a class="boton" href="https://youtu.be/PITZG41X2Vs?si=CCMgQdKI3N9qc5mo" target="_blank">
🎵 Escuchar canción
</a>

</div>

<script>

function crearCorazon(){

let corazon=document.createElement("div");

corazon.className="corazon";

corazon.innerHTML="❤️";

corazon.style.left=Math.random()*100+"vw";

corazon.style.fontSize=(20+Math.random()*30)+"px";

corazon.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},8000);

}

setInterval(crearCorazon,250);

</script>

</body>
</html>
